<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-4xl mx-auto">
    <h1 class="text-xl font-bold mb-4">Form Input Mahasiswa</h1>

    <form action="/addMahasiswa" method="post" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-gray-700">Nama:</label>
            <input type="text" name="nama" class="w-full border border-gray-300 p-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">NIM:</label>
            <input type="text" name="nim" class="w-full border border-gray-300 p-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Kelamin:</label>

            <div class="flex items-center mb-1">
                <input type="radio" name="jk" value="Laki-laki" id="laki" class="mr-2">
                <label for="laki" class="text-sm text-gray-700">Laki-laki</label>
            </div>

            <div class="flex items-center">
                <input type="radio" name="jk" value="Perempuan" id="perempuan" class="mr-2">
                <label for="perempuan" class="text-sm text-gray-700">Perempuan</label>
            </div>
        </div>

        <div>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 hover:bg-blue-700">
                Submit
            </button>
        </div>
    </form>

    <a href="/home" class="text-blue-600 hover:underline mt-6 block">Kembali ke Home</a>
</div>

</body>
</html>
