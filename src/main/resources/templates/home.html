<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-5xl mx-auto">
    <h1 class="text-xl font-bold mb-1">MY Website 20230140154</h1>
    <p class="text-gray-700 mb-2">Selamat datang di aplikasi!</p>

    <a href="/form" class="text-blue-600 hover:underline block mb-6">+ Input Data Mahasiswa</a>

    <h2 class="font-bold mb-2">Data Mahasiswa</h2>

    <table class="w-full border border-gray-300">
        <thead>
        <tr class="bg-blue-600 text-white">
            <th class="py-2 px-4 border border-blue-500 w-20">No</th>
            <th class="py-2 px-4 border border-blue-500">Nama</th>
            <th class="py-2 px-4 border border-blue-500">NIM</th>
            <th class="py-2 px-4 border border-blue-500">Jenis Kelamin</th>
        </tr>
        </thead>

        <tbody class="bg-white">
        <tr th:each="mhs, stat : ${data}" class="text-center border-b">
            <td class="py-2 px-4 border" th:text="${stat.index + 1}"></td>
            <td class="py-2 px-4 border" th:text="${mhs[0]}"></td>
            <td class="py-2 px-4 border" th:text="${mhs[1]}"></td>
            <td class="py-2 px-4 border" th:text="${mhs[2]}"></td>
        </tr>
        </tbody>

    </table>
    <a href="/logout" class="text-blue-600 hover:underline mt-6 block">Logout</a>
</div>

</body>
</html>
